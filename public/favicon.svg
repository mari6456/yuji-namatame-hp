<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048" role="img" aria-labelledby="title desc">
  <title id="title">studio OTO drum logo</title>
  <desc id="desc">A refined front-facing drum logo for studio OTO with a small paw-like percussion mark.</desc>
  <defs>
    <radialGradient id="drumSkin" cx="50%" cy="42%" r="64%">
      <stop offset="0%" stop-color="#fbf8f1"/>
      <stop offset="62%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#ece7dd"/>
    </radialGradient>
    <style>
      .ink { fill: #1f1f1d; }
      .line { fill: none; stroke: #1f1f1d; stroke-linecap: round; stroke-linejoin: round; }
      .soft-line { fill: none; stroke: #4e4b45; stroke-linecap: round; stroke-linejoin: round; }
      .word {
        font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-weight: 300;
        letter-spacing: 0.16em;
      }
    </style>
  </defs>

  <g transform="translate(1024 1024)">
    <circle r="756" fill="url(#drumSkin)"/>
    <circle r="690" fill="none" stroke="#d8d1c5" stroke-width="2" opacity="0.22"/>
    <circle r="610" fill="none" stroke="#d8d1c5" stroke-width="1.5" opacity="0.16"/>
    <circle r="774" class="line" stroke-width="14"/>
    <circle r="742" class="soft-line" stroke-width="5"/>
    <circle r="716" class="soft-line" stroke-width="3" opacity="0.65"/>

    <g class="ink">
      <g id="lug">
        <rect x="-27" y="-812" width="54" height="48" rx="13"/>
        <rect x="-18" y="-801" width="36" height="26" rx="7" fill="#f4f1ea" opacity="0.18"/>
      </g>
      <use href="#lug" transform="rotate(45)"/>
      <use href="#lug" transform="rotate(90)"/>
      <use href="#lug" transform="rotate(135)"/>
      <use href="#lug" transform="rotate(180)"/>
      <use href="#lug" transform="rotate(225)"/>
      <use href="#lug" transform="rotate(270)"/>
      <use href="#lug" transform="rotate(315)"/>
    </g>

    <text class="ink word" x="0" y="72" text-anchor="middle" font-size="154">studio OTO</text>

    <g class="ink" transform="translate(0 456) scale(1.05)" opacity="0.92">
      <ellipse cx="-48" cy="-6" rx="15" ry="24" transform="rotate(-8 -48 -6)"/>
      <ellipse cx="-17" cy="-34" rx="15" ry="24" transform="rotate(2 -17 -34)"/>
      <ellipse cx="17" cy="-34" rx="15" ry="24" transform="rotate(-2 17 -34)"/>
      <ellipse cx="48" cy="-6" rx="15" ry="24" transform="rotate(8 48 -6)"/>
      <path d="M -38 38 C -30 5, 30 5, 38 38 C 42 56, 27 70, 0 70 C -27 70, -42 56, -38 38 Z"/>
    </g>
  </g>
</svg>
